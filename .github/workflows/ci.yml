name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Verify formatting
        run: |
          unformatted=$(go run golang.org/x/tools/cmd/goimports@latest -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files need goimports:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1
